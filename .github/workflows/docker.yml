name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  VALIDATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/constantinople-validator
  MINER_IMAGE: ghcr.io/${{ github.repository_owner }}/constantinople-miner

jobs:
  build-validator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.validator
          push: true
          tags: ${{ env.VALIDATOR_IMAGE }}:latest,${{ env.VALIDATOR_IMAGE }}:${{ github.sha }}

  build-miner:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.miner
          push: true
          tags: ${{ env.MINER_IMAGE }}:latest,${{ env.MINER_IMAGE }}:${{ github.sha }}
